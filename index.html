<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <!-- 화면 크기에 맞게 자동으로 조절되도록 설정 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사다리</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 로비 화면 -->
  <main id="lobby" class="lobby" aria-label="게임 로비">
    <h1 class="title">사다리 게임</h1>
    <button id="join-btn" type="button" class="join-btn">게임 참가</button>
  </main>

  <!-- 설정 화면 -->
  <main id="settings-screen" class="settings-screen is-hidden" aria-label="게임 설정">
    <h1 class="title">게임 설정</h1>
    <form id="settings-form" class="settings-form">
      <fieldset class="settings-field settings-player-count-field">
        <legend class="settings-label">플레이어 수</legend>
        <div class="settings-player-count-options">
          <label class="settings-player-count-option">
            <input type="radio" name="player-count" value="2" checked>
            <span>2명</span>
          </label>
          <label class="settings-player-count-option">
            <input type="radio" name="player-count" value="3">
            <span>3명</span>
          </label>
          <label class="settings-player-count-option">
            <input type="radio" name="player-count" value="4">
            <span>4명</span>
          </label>
          <label class="settings-player-count-option">
            <input type="radio" name="player-count" value="5">
            <span>5명</span>
          </label>
          <label class="settings-player-count-option">
            <input type="radio" name="player-count" value="6">
            <span>6명</span>
          </label>
        </div>
      </fieldset>
      <div id="player-names-list" class="player-names-list"></div>
      <fieldset class="settings-field settings-map-field">
        <legend class="settings-label">맵 길이</legend>
        <div class="settings-map-options">
          <label class="settings-map-option">
            <input type="radio" name="map-size" value="30">
            <span>30칸 (사다리·미끄럼틀 각 3개)</span>
          </label>
          <label class="settings-map-option">
            <input type="radio" name="map-size" value="50">
            <span>50칸 (사다리·미끄럼틀 각 4개)</span>
          </label>
          <label class="settings-map-option">
            <input type="radio" name="map-size" value="100" checked>
            <span>100칸 (사다리·미끄럼틀 각 5개)</span>
          </label>
        </div>
      </fieldset>
      <label class="settings-field">
        <span class="settings-label">굴리는 시간</span>
        <div class="settings-range-row">
          <input id="spin-duration" class="settings-range" type="range" min="2" max="8" step="0.5" value="4.8">
          <span id="spin-duration-value" class="settings-range-value">4.8초</span>
        </div>
      </label>
      <label class="settings-field settings-custom-toggle">
        <input id="custom-map-enabled" type="checkbox">
        <span class="settings-label">커스텀 설정 (사다리·미끄럼틀 위치 직접 지정)</span>
      </label>
      <div id="custom-map-panel" class="custom-map-panel is-hidden">
        <p class="custom-map-hint">
          사다리: 낮은 칸 → 높은 칸 &nbsp;|&nbsp; 미끄럼틀: 높은 칸 → 낮은 칸<br>
          사용하는 칸 번호는 서로 겹치면 안 됩니다.
        </p>
        <div id="custom-ladders-list" class="custom-pair-list"></div>
        <div id="custom-arrows-list" class="custom-pair-list"></div>
        <p id="custom-map-error" class="custom-map-error is-hidden" role="alert"></p>
      </div>
      <div class="settings-actions">
        <button id="settings-back-btn" type="button" class="settings-back-btn">뒤로</button>
        <button id="settings-start-btn" type="submit" class="join-btn">주사위 선택</button>
      </div>
    </form>
  </main>

  <!-- 주사위 선택 화면 (플레이어마다 따로) -->
  <main id="dice-setup-screen" class="dice-setup-screen is-hidden" aria-label="주사위 선택">
    <h1 class="title">주사위 선택</h1>
    <p id="dice-setup-progress" class="dice-setup-progress">1 / 2</p>
    <p id="dice-setup-player" class="dice-setup-player">플레이어 1</p>
    <p class="dice-setup-privacy">다른 플레이어에게 화면을 보여주지 마세요.</p>
    <form id="dice-setup-form" class="dice-setup-form">
      <fieldset id="dice-setup-options" class="dice-setup-options"></fieldset>
      <p id="dice-setup-error" class="dice-setup-error is-hidden" role="alert"></p>
      <div class="settings-actions">
        <button id="dice-setup-back-btn" type="button" class="settings-back-btn">뒤로</button>
        <button id="dice-setup-next-btn" type="submit" class="join-btn">확인</button>
      </div>
    </form>
  </main>

  <!-- 게임 화면 (처음에는 숨김) -->
  <main id="game-screen" class="page is-hidden" aria-label="게임 화면">
    <h1 class="title">사다리 게임</h1>

    <div class="board-wrapper">
      <div class="board-stack">
        <div id="board" class="board" aria-label="사다리와 미끄럼틀 게임판"></div>

        <div class="start-row" id="start-row">
          <div id="start-cell" class="start-cell cell color-start" data-number="0" aria-label="시작 칸">0</div>
        </div>
      </div>

      <svg id="overlay" class="overlay" aria-hidden="true"></svg>
      <div id="tokens" class="tokens-layer" aria-label="플레이어 말"></div>
    </div>

    <section class="game-controls" aria-label="게임 조작">
      <p id="turn-info" class="turn-info">플레이어 1의 차례입니다</p>
      <div class="dice-area">
        <div class="slot-machine" id="dice-slot" aria-label="주사위 슬롯">
          <div class="slot-window">
            <div class="slot-reel" id="dice-reel"></div>
          </div>
        </div>
        <button id="roll-btn" type="button" class="roll-btn">주사위 굴리기 🎲</button>
      </div>
      <p id="game-message" class="game-message" aria-live="polite"></p>
      <div id="opponent-picker" class="opponent-picker is-hidden" role="dialog" aria-label="상대 선택">
        <p class="opponent-picker-title">-1 주사위: 눈-1을 적용할 상대를 선택하세요</p>
        <div id="opponent-picker-buttons" class="opponent-picker-buttons"></div>
      </div>
      <button id="quit-btn" type="button" class="quit-btn">게임 그만두기</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
